name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/gitpic"
          tar -C "$(dirname "$bin")" -czf "gitpic-${{ matrix.target }}.tar.gz" gitpic
          shasum -a 256 "gitpic-${{ matrix.target }}.tar.gz" > "gitpic-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/gitpic.exe"
          Compress-Archive -Path $bin -DestinationPath "gitpic-${{ matrix.target }}.zip"
          (Get-FileHash "gitpic-${{ matrix.target }}.zip" -Algorithm SHA256).Hash | Out-File "gitpic-${{ matrix.target }}.zip.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gitpic-${{ matrix.target }}.tar.gz
            gitpic-${{ matrix.target }}.tar.gz.sha256
            gitpic-${{ matrix.target }}.zip
            gitpic-${{ matrix.target }}.zip.sha256
          fail_on_unmatched_files: false
